# GaussOS quickstart: the API server + the Deno web UI.
# Usage:  docker compose up --build
#   API:    http://localhost:8080
#   Web UI: http://localhost:3000
#
# The default backend is the embedded SurrealDB, so no database container is
# required. Set an LLM key (e.g. OPENAI_API_KEY) to enable the agent layer.

services:
  gaussos:
    build: .
    image: gaussos:latest
    ports:
      - "8080:8080"
    environment:
      RUST_LOG: info
      # Pick a provider + key to enable the agent layer (optional):
      # LLM_PROVIDER: openai
      # OPENAI_API_KEY: ${OPENAI_API_KEY}
    healthcheck:
      test: ["CMD", "/usr/local/bin/gaussos", "--version"]
      interval: 30s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  web-ui:
    image: denoland/deno:alpine
    working_dir: /app
    command: ["run", "--allow-net", "--allow-read", "--allow-env", "main.ts"]
    volumes:
      - ./web-ui:/app
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      BACKEND_URL: "http://gaussos:8080"
    depends_on:
      - gaussos
    restart: unless-stopped

  # Observability stack (Prometheus + Grafana). Opt in with:
  #   docker compose --profile observability up
  prometheus:
    image: prom/prometheus:latest
    profiles: ["observability"]
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    profiles: ["observability"]
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
    volumes:
      - ./deploy/grafana-dashboard.json:/var/lib/grafana/dashboards/gaussos.json:ro
      - ./deploy/grafana-provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
